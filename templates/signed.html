<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Artists</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .artist { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        button { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .back { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>{{ game_state.label_name }} Records: Signed Artists</h1>
    <p>Funds: ${{ game_state.money }}</p>
    {% if game_state.signed_artists %}
        {% for artist in game_state.signed_artists %}
            <div class="artist">
                <h3>{{ artist.name }} ({{ artist.genre }})</h3>
                <a href="{{ url_for('manage_artist', idx=loop.index0) }}"><button>Manage</button></a>
            </div>
        {% endfor %}
    {% else %}
        <p>You haven't signed any artists yet.</p>
    {% endif %}
    <div class="back">
        <a href="{{ url_for('menu') }}"><button>Back to Main Menu</button></a>
    </div>
</body>
</html>

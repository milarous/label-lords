<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Lords Setup</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { max-width: 400px; margin: auto; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px; width: 100%; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Welcome to Label Lords - A Chart Wars 3 Clone!</h1>
    <p>Please enter the following information to get started:</p>
    <form method="post">
        <label for="ceo_name">CEO Name:</label>
        <input type="text" id="ceo_name" name="ceo_name" required>

        <label for="label_name">Record Label Name:</label>
        <input type="text" id="label_name" name="label_name" required>

        <label for="starting_year">Starting Year:</label>
        <input type="number" id="starting_year" name="starting_year" value="2000" required>

        <label for="country">Country:</label>
        <select id="country" name="country" required>
            <option value="Australia">Australia</option>
        </select>

        <label for="city">City:</label>
        <select id="city" name="city" required>
            <option value="Adelaide">Adelaide</option>
        </select>

        <button type="submit">OK</button>
    </form>
</body>
</html>
